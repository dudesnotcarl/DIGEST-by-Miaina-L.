<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGEST by Miaina L.</title>
  <link rel="stylesheet" href="style.css?v=1.22.4">
</head>
<body>

  <button id="savedWordsBtn" onclick="openSavedUI()">Saved Words</button>

  <div id="savedUI">
    <div id="savedPanel">
      <button id="closeSavedBtn" onclick="closeSavedUI()">✕</button>
      <h2>Saved Word Sets</h2>
      <div id="savedContainer"></div>
    </div>
  </div>

  <div class="container">
    <h1 class="mainTitle">Word Randomiser</h1>
    <p class="subTitle">by DIGEST</p>

    <div id="inputSection">
      <textarea id="wordInput" placeholder="enter one word PER LINE"></textarea>

      <div id="saveControls">
        <button onclick="saveWords()">Save Words</button>
      </div>
    </div>

    <div id="controls">
      <button id="spinBtn" onclick="handleSpin()">Spin</button>
      <button id="clearWordsBtn" onclick="clearWords()">Clear</button>
    </div>

    <div id="wordList"></div>

    <div id="wheelContainer">
      <canvas id="wheelCanvas" width="400" height="400"></canvas>
      <div id="pointer"></div>
    </div>

    <h2 id="selectedWord" style="display:none;"></h2>
    <button id="startTimerBtn" onclick="goToTimer()">Start Timer</button>
  </div>

  <script src="script.js?v=1.22.4"></script>

  <footer>
    © 2026 by Miaina Luz
  </footer>

</body>
</html>
