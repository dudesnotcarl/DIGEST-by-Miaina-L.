<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGEST by Miaina L.</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1>Word Randomiser by DIGEST</h1>

    <div id="inputSection">
      <textarea id="wordInput" placeholder="enter words here separated by commas pretty please"></textarea>
    </div>

    <button id="spinBtn" onclick="handleSpin()">Spin</button>
    <button id="clearWordsBtn" onclick="clearWords()">Clear</button>

    <div id="wordList"></div>

    <div id="wheelContainer">
      <canvas id="wheelCanvas" width="400" height="400"></canvas>
      <div id="pointer"></div>
    </div>

    <h2 id="selectedWord" style="display:none;"></h2>
    <button id="startTimerBtn" onclick="goToTimer()">Start Timer</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
